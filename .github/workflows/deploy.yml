name: Build & Deploy to Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking critical routes..."
          for page in index.html about.html offering.html portfolio.html blog.html contact.html privacy.html; do
            if [ -f "out/$page" ]; then
              echo "  ok $page"
            else
              echo "  MISSING $page" && exit 1
            fi
          done
          echo ""
          echo "Build output size:"
          du -sh out
          echo "Total files:"
          find out -type f | wc -l

  deploy:
    name: Deploy to Render
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_HOOK")
          if [ "$STATUS" = "200" ]; then
            echo "Deploy triggered successfully"
          else
            echo "Failed to trigger deploy (HTTP $STATUS)"
            exit 1
          fi
